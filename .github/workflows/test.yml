name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0          # full history + tags for setuptools_scm

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libjpeg-turbo8-dev \
          libpng-dev \
          libwebp-dev \
          liblz4-dev \
          libcurl4-openssl-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # Test/runtime deps. torch + torchvision (CPU wheels) are required by the
        # parity tests; without them those modules fail to import and pytest aborts
        # collection (exit 2), failing the whole suite.
        pip install pytest pytest-cov numpy pybind11 Pillow
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    - name: Build & install TurboLoader (native extension)
      run: |
        # Build the C++20 extension into this environment. -v surfaces compiler errors.
        # setuptools_scm derives the version from git (needs fetch-depth: 0 above).
        pip install -e . -v
        # Fail fast here (not mid-test) if the native module didn't build or import,
        # and confirm the version is single-sourced (version() == __version__).
        python -c "import turboloader as t, _turboloader; \
          print('built turboloader', t.version()); \
          assert t.version() == t.__version__, (t.version(), t.__version__)"

    - name: Run Python tests
      run: |
        pytest tests/ -v --cov=turboloader --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  cpp-test:
    name: C++ Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0          # full history + tags for setuptools_scm

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          libjpeg-turbo8-dev \
          libpng-dev \
          libwebp-dev \
          liblz4-dev \
          libcurl4-openssl-dev

    - name: Build C++ tests
      run: |
        mkdir -p build
        cd build
        cmake ..
        make -j$(nproc)

    - name: Run C++ tests
      run: |
        cd build
        ctest --output-on-failure -j$(nproc) -E "avx512_simd"

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0          # full history + tags for setuptools_scm

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 mypy

    - name: Check code formatting with black
      run: |
        black --check --diff turboloader/ tests/

    - name: Lint with flake8
      run: |
        flake8 turboloader/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
