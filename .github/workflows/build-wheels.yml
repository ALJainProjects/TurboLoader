name: Build Wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Wheels ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # Portable wheels for Linux (manylinux x86_64 + aarch64) and macOS (arm64 + x86_64).
    # macOS wheels build their C deps (jpeg-turbo/png/webp/lz4) FROM SOURCE at a fixed
    # MACOSX_DEPLOYMENT_TARGET=11.0 (not Homebrew bottles, which target the runner's OS
    # and are non-portable), so they install on macOS 11+. macOS legs are best-effort
    # (continue-on-error) so a runner toolchain hiccup never blocks the release — the
    # sdist always covers macOS too.
    continue-on-error: ${{ matrix.optional == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x86_64,   os: ubuntu-latest,    archs: x86_64 }
          - { name: linux-aarch64,  os: ubuntu-24.04-arm, archs: aarch64 }
          - { name: macos-arm64,    os: macos-14,         archs: arm64,  optional: true }
          - { name: macos-x86_64,   os: macos-13,         archs: x86_64, optional: true }

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0          # full history + tags for setuptools_scm

      # macOS: select the newest installed Xcode (older defaults like 15.4 have a libc++
      # bug that mis-parses C++20 in <memory>), and install cmake for the build-from-
      # source deps. Do NOT brew-install the C deps — we build them ourselves so the
      # bundled dylibs target macOS 11.0 and the wheel stays portable.
      - name: Prepare macOS toolchain
        if: runner.os == 'macOS'
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          clang++ --version
          brew install --quiet cmake || brew upgrade --quiet cmake || true

      # Resolve the version on the host and pass it into the build containers via
      # SETUPTOOLS_SCM_PRETEND_VERSION, so setuptools_scm never has to introspect git
      # inside manylinux (which is brittle). Derive it WITHOUT pip/setuptools_scm:
      # macOS runners ship an externally-managed Python (PEP 668) that blocks
      # `pip install`. On a release the version IS the tag; otherwise a dev placeholder.
      - name: Resolve version
        id: scm
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="0.0.0.dev0+$(echo "${GITHUB_SHA}" | cut -c1-8)"
          fi
          echo "Resolved version: $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_* *-win32 *-manylinux_i686"
          CIBW_ARCHS: ${{ matrix.archs }}

          # macOS: build the C deps from source at a FIXED 11.0 target (once per
          # platform), into /tmp/tbl_deps; setup.py picks them up via
          # TURBOLOADER_DEPS_PREFIX. Single-arch (not universal2).
          CIBW_BEFORE_ALL_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=11.0 TURBOLOADER_DEPS_PREFIX=/tmp/tbl_deps
            ARCH=${{ matrix.archs }} bash {project}/scripts/build_macos_deps.sh
          CIBW_ENVIRONMENT_MACOS: >
            MACOSX_DEPLOYMENT_TARGET=11.0
            ARCHFLAGS="-arch ${{ matrix.archs }}"
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.scm.outputs.version }}
            TURBOLOADER_DEPS_PREFIX=/tmp/tbl_deps

          # Linux: manylinux runs on AlmaLinux/yum.
          CIBW_BEFORE_ALL_LINUX: |
            (yum install -y epel-release || true)
            yum install -y \
              libjpeg-turbo-devel \
              libpng-devel \
              libwebp-devel \
              libcurl-devel \
              lz4-devel \
              gcc-c++ \
              make || true

          CIBW_ENVIRONMENT_LINUX: >
            CFLAGS="-I/usr/include -I/usr/include/lz4"
            LDFLAGS="-L/usr/lib64 -L/usr/lib"
            PKG_CONFIG_PATH="/usr/lib64/pkgconfig:/usr/lib/pkgconfig"
            TURBOLOADER_PORTABLE="1"
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.scm.outputs.version }}

          CIBW_BUILD_VERBOSITY: 1

          # Smoke-test every wheel: import + a transform + verify the version is
          # the real package version (not a stale hardcoded string).
          CIBW_TEST_REQUIRES: numpy
          CIBW_TEST_COMMAND: >
            python -c "import turboloader, numpy as np;
            assert turboloader.version() == turboloader.__version__, (turboloader.version(), turboloader.__version__);
            img = np.random.randint(0,255,(64,48,3),dtype=np.uint8);
            assert turboloader.Resize(32,32).apply(img).shape == (32,32,3);
            print('TurboLoader', turboloader.version(), 'OK')"

          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w {dest_dir} {wheel}"
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: "delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: ./wheelhouse/*.whl
          retention-days: 7

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0          # full history + tags for setuptools_scm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          retention-days: 7

  # Automated PyPI publish: on any `vX.Y.Z` tag, gather all wheels + sdist and upload
  # to PyPI via Trusted Publishing (OIDC) — no API token stored in the repo.
  # One-time setup on PyPI required (see RELEASING.md): add a Trusted Publisher for
  # owner=ALJainProjects, repo=TurboLoader, workflow=build-wheels.yml, environment=pypi.
  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/turboloader
    permissions:
      id-token: write          # OIDC token for Trusted Publishing
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted Publishing (OIDC) is used automatically — no `password:` needed.
        # To use an API token instead, add the PYPI_API_TOKEN secret and set:
        #   with: { password: ${{ secrets.PYPI_API_TOKEN }} }
